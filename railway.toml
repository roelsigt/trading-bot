# Railway configuratie
# De bot draait elke beursdag om 07:00 UTC = 08:00 Vlaamse tijd (winter)
[build]
builder = "nixpacks"

[deploy]
cronSchedule = "0 7 * * 1-5"# Railway configuratie
# De bot draait elke beursdag om 07:15 UTC = 08:15 Vlaamse tijd (winter) / 09:15 (zomer)
# Pas aan naar 06:15 UTC in de zomer (CEST = UTC+2)

[build]
builder = "nixpacks"

[deploy]
startCommand = "node bot.js"
cronSchedule = "0 7 * * 1-5"
